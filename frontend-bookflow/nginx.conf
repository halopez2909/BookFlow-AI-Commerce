server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Client-side routing: si el archivo no existe, devolver index.html
    # para que React Router resuelva la ruta en el navegador.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresivo para assets versionados de Vite
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}