services:
  mock:
    build:
      context: .
      dockerfile: mock/Dockerfile
    container_name: bookflow-mock
    ports:
      - "8000:8000"
    volumes:
      - ./mock-bff.cjs:/app/mock-bff.cjs
      - ./batches.json:/app/batches.json
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookflow-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_BFF_URL=http://mock:8000
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      - mock
    restart: unless-stopped
